<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Launched Website</title>
<link rel="stylesheet" href="/lib/site-theme.css" />

<style>
html {
  box-sizing: border-box;
  overflow-x: hidden;
  max-width: 100%;
}

*,
*::before,
*::after {
  box-sizing: inherit;
}

body {
  margin: 0;
  width: 100%;
  max-width: 100%;
  overflow-x: hidden;
}

#loadStatus {
  padding: 40px;
  font-size: 18px;
  font-family: Arial, sans-serif;
}
</style>
</head>

<body>

<div id="loadStatus" style="padding:40px;font-size:18px;">Loading website...</div>

<nav class="site-navbar" style="display:none;">
<div class="nav-brand">
<img id="launchedLogo" style="display:none;">
<span id="launchedBusinessName">Website</span>
</div>

<div class="nav-links" id="launchedNavLinks"></div>
</nav>

<main style="display:none;">

<div id="homeSectionsRoot"></div>

<section id="customPageSection" style="display:none;">
<h2 id="customPageTitle" class="section-heading"></h2>
<div id="customPageContent"></div>
</section>
</main>

<footer style="display:none;">
<p id="footerText">Built with AI Website Builder</p>
</footer>

<script src="/lib/site-schema.js"></script>
<script>

function getSiteId() {
const params = new URLSearchParams(window.location.search);
return params.get("id");
}

let launchedSiteData = null;

function renderLaunchedNavbar(data) {
  const navLinks = document.getElementById("launchedNavLinks");
  if (!navLinks) return;

  const pages = data.pages || [
    { slug: "home", title: "Home" }
  ];

  navLinks.innerHTML = pages.map(page => `
    <a href="#" onclick="showLaunchedPage('${page.slug}'); return false;">${page.title}</a>
  `).join("");

  SiteSchema.getHomeSectionNavLinks(data).forEach((section) => {
    if (!pages.some((page) => page.slug === section.id)) {
      const label = section.title || section.id;
      navLinks.innerHTML += `
        <a href="#" onclick="showLaunchedPage('${section.id}'); return false;">${label}</a>
      `;
    }
  });
}

function renderLaunchedComponents(components) {
  return (components || []).map(c => {
    if (c.type === "text") {
      return `<div class="text-block">${c.value || ""}</div>`;
    }

    if (c.type === "pricing") {
      return `
        <div class="cards">
          ${(c.tiers || []).map(t => `
            <div class="card">
              <h3>${t.name || ""}</h3>
              <p style="font-size:30px;font-weight:bold;">$${t.price || ""}</p>
              <p>${t.description || ""}</p>
            </div>
          `).join("")}
        </div>
      `;
    }

    if (c.type === "button") {
      return `
        <a href="${c.link || "#"}" class="theme-cta">
          ${c.text || "Click Here"}
        </a>
      `;
    }

    if (c.type === "testimonial") {
      return `
        <div class="cards">
          ${(c.reviews || []).map(r => `
            <div class="card">
              <p class="theme-accent">${"★".repeat(r.rating || 5)}</p>
              <p>"${r.quote || ""}"</p>
              <strong>${r.name || "Customer"}</strong>
            </div>
          `).join("")}
        </div>
      `;
    }

    if (c.type === "faq") {
      return `
        <div>
          ${(c.items || []).map(item => `
            <div class="card" style="margin-bottom:14px;">
              <h3>${item.question || ""}</h3>
              <p>${item.answer || ""}</p>
            </div>
          `).join("")}
        </div>
      `;
    }

    return "";
  }).join("");
}

function showLaunchedPage(slug) {
  if (!launchedSiteData) return;

  const homeRoot = document.getElementById("homeSectionsRoot");
  const custom = document.getElementById("customPageSection");
  const page = (launchedSiteData.pages || []).find(p => p.slug === slug);

  custom.style.display = "none";

  if (page && slug !== "home") {
    homeRoot.style.display = "none";
    document.getElementById("customPageTitle").textContent = page.title || "";
    document.getElementById("customPageContent").innerHTML =
      renderLaunchedComponents(page.components || []);
    custom.style.display = "block";
    return;
  }

  homeRoot.style.display = "block";

  homeRoot.querySelectorAll("[data-section-id]").forEach((sectionEl) => {
    const sectionId = sectionEl.dataset.sectionId;
    const sectionType = sectionEl.dataset.sectionType;
    const shouldShow = slug === "home" || sectionId === slug;
    const displayMode = sectionType === "hero" ? "block" : "block";

    sectionEl.style.display = shouldShow ? displayMode : "none";
  });
}

function renderLaunchedSite(rawData) {
  launchedSiteData = SiteSchema.normalizeSiteData(rawData);
  const data = launchedSiteData;
  const homeRoot = document.getElementById("homeSectionsRoot");

  renderLaunchedNavbar(data);
  SiteSchema.renderHomeSections(homeRoot, data, { mode: "launched" });

  SiteSchema.applyThemeStyles(document.body, data.theme, data.layout);

  document.title = data.heroTitle || "Launched Website";

document.getElementById("footerText").textContent =
data.heroTitle || "Built with AI Website Builder";

document.getElementById("launchedBusinessName").textContent =
data.heroTitle || "Website";

if (data.logoUrl) {
const logo = document.getElementById("launchedLogo");
logo.src = data.logoUrl;
logo.style.display = "block";
}

showLaunchedPage("home");
}

const UUID_REGEX =
  /^[0-9a-f]{8}-[0-9a-f]{4}-[1-5][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$/i;

function isLocalTestId(siteId) {
  return siteId.startsWith("site-");
}

function loadFromLocalStorage(siteId) {
  const savedSite = localStorage.getItem(siteId);

  if (!savedSite) {
    return null;
  }

  return JSON.parse(savedSite);
}

function showLoadError(message) {
  document.getElementById("loadStatus").textContent = message;
}

function revealLaunchedPage() {
  document.getElementById("loadStatus").style.display = "none";
  document.querySelector(".site-navbar").style.display = "";
  document.querySelector("main").style.display = "";
  document.querySelector("footer").style.display = "";
}

function parseLaunchedApiError(rawText, fallbackMessage) {
  if (!rawText) {
    return fallbackMessage;
  }

  try {
    const parsed = JSON.parse(rawText);
    return parsed.error || fallbackMessage;
  } catch {
    if (/NOT_FOUND|FUNCTION_INVOCATION_FAILED/i.test(rawText)) {
      return "Could not load the published site API.";
    }

    return rawText.length > 180 ? fallbackMessage : rawText;
  }
}

async function loadLaunchedSite() {
  const siteId = getSiteId();
  const loadStatus = document.getElementById("loadStatus");

  if (!siteId) {
    showLoadError("No site ID found.");
    return;
  }

  const params = new URLSearchParams(window.location.search);
  const forceLocalTest = params.get("test") === "local";

  if (forceLocalTest || isLocalTestId(siteId)) {
    try {
      const data = loadFromLocalStorage(siteId);

      if (!data) {
        showLoadError("Site not found in localStorage (test mode).");
        return;
      }

      renderLaunchedSite(SiteSchema.normalizeSiteData(data));
      revealLaunchedPage();
    } catch (error) {
      console.error("Local test load failed:", error);
      showLoadError("Could not load site from localStorage.");
    }
    return;
  }

  if (!UUID_REGEX.test(siteId)) {
    showLoadError("Invalid site ID.");
    return;
  }

  loadStatus.textContent = "Loading website...";

  try {
    const response = await fetch(
      `/api/get-published-site?id=${encodeURIComponent(siteId)}`
    );

    const rawText = await response.text();
    let payload = {};

    try {
      payload = rawText ? JSON.parse(rawText) : {};
    } catch {
      throw new Error(
        parseLaunchedApiError(rawText, "Site not found.")
      );
    }

    if (!response.ok) {
      throw new Error(
        parseLaunchedApiError(rawText, payload.error || "Site not found.")
      );
    }

    renderLaunchedSite(payload.siteData);
    revealLaunchedPage();
  } catch (error) {
    console.error("Published site load failed:", error);
    showLoadError(error.message || "Site not found.");
  }
}

loadLaunchedSite();

</script>

</body>
</html>
