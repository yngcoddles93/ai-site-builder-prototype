<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Site Builder Prototype</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 960px;
      margin: 60px auto;
      padding: 20px;
    }

    h1 {
      font-size: 42px;
      margin-bottom: 10px;
      text-align: center;
    }

    .subtext {
      font-size: 18px;
      color: #cbd5e1;
      margin-bottom: 30px;
      text-align: center;
    }

    textarea {
      width: 100%;
      height: 130px;
      padding: 15px;
      border-radius: 12px;
      border: none;
      font-size: 16px;
      resize: none;
      box-sizing: border-box;
    }

    button {
      margin-top: 18px;
      padding: 14px 28px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      background: #3b82f6;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #2563eb;
    }

    .status {
      margin-top: 12px;
      color: #cbd5e1;
      min-height: 24px;
    }

    .preview {
      margin-top: 35px;
      background: #111827;
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid #1f2937;
    }

    .hero {
      padding: 55px 30px;
      background: linear-gradient(135deg, #1d4ed8, #0f172a);
    }

    .hero h2 {
      font-size: 38px;
      margin: 0 0 12px;
    }

    .hero p {
      font-size: 18px;
      color: #dbeafe;
      margin: 0;
      max-width: 700px;
    }

    .section {
      padding: 30px;
      border-top: 1px solid #1f2937;
    }

    .section h3 {
      margin-top: 0;
      font-size: 26px;
      margin-bottom: 16px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
    }

    .card {
      background: #1e293b;
      padding: 18px;
      border-radius: 14px;
    }

    .card h4 {
      margin: 0 0 8px;
      font-size: 18px;
    }

    .card p {
      margin: 0;
      color: #cbd5e1;
      line-height: 1.5;
    }

    .contact-box {
      background: #1e293b;
      padding: 20px;
      border-radius: 14px;
      color: #cbd5e1;
      line-height: 1.7;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Describe the website you want.</h1>
    <p class="subtext">This prototype uses AI to turn a prompt into a website preview.</p>

    <textarea id="promptInput" placeholder="Example: Build a modern website for a mobile detailing business with a dark theme, services, pricing, testimonials, and contact section."></textarea>
    <br />
    <button onclick="generateSite()">Generate Website</button>

<br /><br />

<textarea id="editPrompt" placeholder="Example: Add testimonials, change colors to gold, or make tone more modern"></textarea>
<br />
<button onclick="modifySite()">Modify Website</button>
    <div class="status" id="statusText"></div>

    <div class="preview" id="previewBox" style="display:none;">
      <div class="hero">
        <h2 id="heroTitle">Your website title will appear here</h2>
        <p id="heroSubtitle">Your AI-generated subtitle will appear here.</p>
      </div>

      <div class="section">
        <h3>Services</h3>
        <div class="cards" id="servicesGrid"></div>
      </div>

      <div class="section">
        <h3>Why Choose Us</h3>
        <div class="cards" id="featuresGrid"></div>
      </div>

      <div class="section">
        <h3>Contact</h3>
        <div class="contact-box" id="contactBox"></div>
      </div>
    </div>
  </div>

  <script>
    let siteData = {
  heroTitle: "Business Website",
  heroSubtitle: "A strong modern website built from your prompt.",
  services: [],
  features: [],
  about: "",
  contact: ""
};

const SITE_DATA_KEY = "siteData";
const SITE_HISTORY_KEY = "siteHistory";
const MAX_HISTORY = 20;
    function saveCurrentSite() {
  localStorage.setItem(SITE_DATA_KEY, JSON.stringify(siteData));
}

function loadSavedSite() {
  const saved = localStorage.getItem(SITE_DATA_KEY);

  if (saved) {
    siteData = JSON.parse(saved);
    renderSite(siteData);
  }
}

function saveVersionBeforeChange() {
  const history = JSON.parse(localStorage.getItem(SITE_HISTORY_KEY)) || [];

  history.unshift({
    timestamp: new Date().toISOString(),
    data: JSON.parse(JSON.stringify(siteData))
  });

  if (history.length > MAX_HISTORY) {
    history.pop();
  }

  localStorage.setItem(SITE_HISTORY_KEY, JSON.stringify(history));
}

function getVersionHistory() {
  return JSON.parse(localStorage.getItem(SITE_HISTORY_KEY)) || [];
}

function restoreVersion(index) {
  const history = getVersionHistory();

  if (!history[index]) return;

  siteData = history[index].data;
  saveCurrentSite();
  renderSite(siteData);
  renderHistoryList();
}
    function renderSite(data) {
  document.getElementById("heroTitle").textContent =
    data.heroTitle || "Business Website";

  document.getElementById("heroSubtitle").textContent =
    data.heroSubtitle || "A strong modern website built from your prompt.";

  makeCards(data.services || [], "servicesGrid");
  makeCards(data.features || [], "featuresGrid");

  const aboutText = document.getElementById("aboutText");
  const contactText = document.getElementById("contactText");

  if (aboutText) aboutText.textContent = data.about || "";
  if (contactText) contactText.textContent = data.contact || "";
}
    function makeCards(items, targetId) {
      const target = document.getElementById(targetId);
      target.innerHTML = "";

      items.forEach(item => {
        const div = document.createElement("div");
        div.className = "card";
        div.innerHTML = `
          <h4>${item.title}</h4>
          <p>${item.description}</p>
        `;
        target.appendChild(div);
      });
    }

    async function generateSite() {
      const prompt = document.getElementById("promptInput").value.trim();
      const statusText = document.getElementById("statusText");
      const previewBox = document.getElementById("previewBox");

      if (!prompt) {
        statusText.textContent = "Please enter a website idea first.";
        return;
      }

      statusText.textContent = "Generating website preview...";
      previewBox.style.display = "none";

      try {
        const response = await fetch("/api/generate", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ prompt })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || "Something went wrong.");
        }

       siteData = {
  heroTitle: data.heroTitle || "Business Website",
  heroSubtitle: data.heroSubtitle || "A strong modern website built from your prompt.",
  services: data.services || [],
  features: data.features || [],
  about: data.about || "",
  contact: data.contact || ""
};

renderSite(siteData);
saveCurrentSite();
renderHistoryList();

        document.getElementById("contactBox").innerHTML = `
          <strong>${data.contactHeading || "Get in Touch"}</strong><br><br>
          ${data.contactText || "Add your phone, email, and contact form here."}
        `;

        previewBox.style.display = "block";
        statusText.textContent = "Done.";
      } catch (error) {
        statusText.textContent = "Error: " + error.message;
      }
    }
    async function modifySite() {
  const editPrompt = document.getElementById("editPrompt").value.trim();
  const statusText = document.getElementById("statusText");

  if (!editPrompt) {
    statusText.textContent = "Enter something to modify first.";
    return;
  }

  statusText.textContent = "Updating website...";

  try {
    saveVersionBeforeChange();
    const response = await fetch("/api/generate", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        prompt: "Modify the existing website with this instruction: " + editPrompt
      })
    });

    const data = await response.json();

   siteData = {
  heroTitle: data.heroTitle || siteData.heroTitle,
  heroSubtitle: data.heroSubtitle || siteData.heroSubtitle,
  services: data.services || siteData.services,
  features: data.features || siteData.features,
  about: data.about || siteData.about,
  contact: data.contact || siteData.contact
};

renderSite(siteData);
saveCurrentSite();
renderHistoryList();

    document.getElementById("contactBox").innerHTML =
      "<strong>" + (data.contactHeading || "Get in Touch") + "</strong><br><br>" +
      (data.contactText || "Add your phone, email, and contact form here.");

    statusText.textContent = "Website updated.";
  } catch (error) {
    statusText.textContent = "Update failed.";
  }
}
  </script>
</body>
</html>
