<head>

  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html,
    body {
      overflow-x: hidden;
      max-width: 100%;
    }

    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;

    }
#launchBtn {
  display: inline-block !important;
}
    .container {

      font-size: 42px;

    textarea {

      width: 100%;

      border-radius: 10px;

    }

      background: #2563eb;
    }

    .status {

    }

    .image-controls {
      margin: 20px 0;
      background: #111827;
      border: 1px solid #1f2937;
      padding: 18px;
      border-radius: 14px;
    }

    .image-controls label {
      display: block;
      margin-bottom: 6px;
      color: #cbd5e1;
      font-size: 14px;
    }

    .preview {
      margin-top: 35px;
      width: 100%;
      max-width: 100%;
      border-radius: 18px;
      overflow-x: hidden;
      overflow-y: visible;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.28);
    }

    .logo-suggestion-box {
  margin: 20px 0;
  background: #111827;
  border: 1px solid #1f2937;
  padding: 18px;
  border-radius: 14px;
}

.logo-options-grid {
  margin-top: 18px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 14px;
}

.logo-option {
  background: #1e293b;
  border-radius: 14px;
  padding: 14px;
  text-align: center;
}

.logo-option img {
  max-width: 100%;
  height: 80px;
  object-fit: contain;
  background: white;
  padding: 10px;
  border-radius: 10px;
}

.logo-option button {
  margin-top: 10px;
  padding: 10px 14px;
  font-size: 14px;
}
    
  </style>
</head>

 <button onclick="addPage()">Add Page</button>

      <textarea
        id="logoPromptInput"
        placeholder="Example: Give me premium black and gold logo options for a luxury car detailing business"

<p id="editingLabel" style="color:#cbd5e1; font-weight:bold; margin-bottom:8px;">

</p>

    <br />
   <button onclick="modifySite()">Modify Current Page</button>
    <div class="status" id="statusText"></div>

    <div class="preview" id="previewBox" style="display:none;">
      <nav class="site-navbar">
  <div class="nav-brand">

<div class="nav-links" id="previewNavLinks"></div>
</nav>
      <div class="site-header">
        <img id="siteLogo" class="site-logo" src="" alt="Logo" style="display:none;" />

      <div id="homeSectionsRoot"></div>

<div class="section" id="pagesSection">

  <div class="cards" id="pagesContent"></div>
</div>
    </div>
  </div>

  </div>

  <script src="/lib/site-schema.js"></script>
  <script src="/lib/editor-actions.js"></script>
  <script>
let siteData = SiteSchema.normalizeSiteData({
  theme: {
  background: "#0f172a",
  text: "#ffffff",
  primary: "#3b82f6",
  secondary: "#1e293b",
  accent: "#facc15",
  heroBackground: "#1d4ed8",
  navBackground: "#ffffff",
  navText: "#111111"
},
  layout: {
  heroAlign: "left",
  sectionAlign: "left",
  heroImagePosition: "right",
  navAlign: "space-between"
},
  heroTitle: "Business Website",
  heroSubtitle: "A strong modern website built from your prompt.",
  services: [],
  features: [],
  about: "",
  contact: "",
  logoUrl: "",
  heroImageUrl: "",

  pages: [
    {
      slug: "home",
      title: "Home",
      fileName: "index.html"
    }
  ]
});
let currentPage = "home";
let currentProjectId = null;
let generatedLogoOptions = [];

async function suggestLogos() {
  const promptInput = document.getElementById("logoPromptInput");
  const grid = document.getElementById("logoOptionsGrid");
  const statusText = document.getElementById("statusText");

  console.log("Prompt element:", promptInput);

  if (!promptInput) {
    statusText.textContent = "Logo prompt input not found.";
    return;
  }

  const prompt = promptInput.value.trim();

  if (!prompt) {
    statusText.textContent = "Describe the logo style you want first.";
    return;
  }

  statusText.textContent = "Generating logo options...";
  grid.innerHTML = "<p>Generating logos...</p>";

  try {
    console.log("Sending request to /api/generate-logo...");

    const response = await fetch("/api/generate-logo", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
    body: JSON.stringify({
  prompt,
  siteData
})
    });

    const rawText = await response.text();
    let data = {};

    try {
      data = rawText ? JSON.parse(rawText) : {};
    } catch {
      throw new Error(
        parseApiErrorResponse(rawText, "Logo generation failed.")
      );
    }

    if (!response.ok) {
      throw new Error(
        parseApiErrorResponse(rawText, data.error || "Logo generation failed.")
      );
    }

    generatedLogoOptions = data.logos || [];

    if (generatedLogoOptions.length === 0) {
      throw new Error("No logos were returned.");
    }

    grid.innerHTML = generatedLogoOptions
      .map(
        (logo, index) => `
          <div class="logo-option">
            <img src="${logo.url}" alt="${logo.name}" />
            <p>${logo.name}</p>
            <button onclick="applySuggestedLogo(${index})">
              Apply Logo
            </button>
          </div>
        `
      )
      .join("");

    statusText.textContent = "Logo options generated.";
  } catch (error) {
    console.error("Logo generation error:", error);
    statusText.textContent = "Logo generation failed: " + error.message;
    grid.innerHTML = `<p style="color:#fca5a5;">${error.message}</p>`;
  }
}
function applySuggestedLogo(index) {
  const selectedLogo = generatedLogoOptions[index];

  if (!selectedLogo) {
    document.getElementById("statusText").textContent = "No logo selected.";
    return;
  }

  saveVersionBeforeChange();

  siteData.logoUrl = selectedLogo.url;

  const logoInput = document.getElementById("logoUrlInput");
  if (logoInput) logoInput.value = selectedLogo.url;

  saveCurrentSite();
  renderSite(siteData);
  renderHistoryList();

  document.getElementById("statusText").textContent = "Logo applied.";
}
    let currentEditSection = "all";
    const SITE_DATA_KEY = "siteData";
    const SITE_HISTORY_KEY = "siteHistory";
    const MAX_HISTORY = 5;

   function cleanSiteDataForStorage(data) {
  const safeCopy = JSON.parse(JSON.stringify(data));

  if (safeCopy.heroImageUrl && safeCopy.heroImageUrl.startsWith("data:image")) {
    safeCopy.heroImageUrl = "";
  }

  if (safeCopy.logoUrl && safeCopy.logoUrl.startsWith("data:image")) {
    safeCopy.logoUrl = "";
  }

  return safeCopy;
}

function normalizeCurrentSiteData(data) {
  return SiteSchema.normalizeSiteData(data);
}

function saveCurrentSite() {
  siteData = normalizeCurrentSiteData(siteData);
  const safeSiteData = cleanSiteDataForStorage(siteData);
  localStorage.setItem(SITE_DATA_KEY, JSON.stringify(safeSiteData));
}

function applyNewProjectReset(options = {}) {
  const hideList = options.hideList === true;
  const statusMessage =
    options.statusMessage || "New project started.";

  siteData = SiteSchema.createDefaultSiteData();
  currentProjectId = null;
  currentPage = "home";
  generatedLogoOptions = [];

  localStorage.removeItem(SITE_DATA_KEY);
  localStorage.removeItem(SITE_HISTORY_KEY);

  const inputIds = [
    "promptInput",
    "editPrompt",
    "logoPromptInput",
    "heroImagePromptInput",
    "logoUrlInput",
    "heroImageUrlInput"
  ];

  inputIds.forEach((id) => {
    const el = document.getElementById(id);
    if (el) el.value = "";
  });

  const logoOptionsGrid = document.getElementById("logoOptionsGrid");
  if (logoOptionsGrid) logoOptionsGrid.innerHTML = "";

  const heroImageResult = document.getElementById("heroImageResult");
  if (heroImageResult) heroImageResult.innerHTML = "";

  renderSite(siteData);

  const previewBox = document.getElementById("previewBox");
  if (previewBox) previewBox.style.display = "none";

  const exportBtn = document.getElementById("exportBtn");
  if (exportBtn) exportBtn.style.display = "none";

  const launchBtn = document.getElementById("launchBtn");
  if (launchBtn) launchBtn.style.display = "none";

  const editingLabel = document.getElementById("editingLabel");
  if (editingLabel) editingLabel.textContent = "Editing: Home";

  setEditSection("all");
  renderHistoryList();

  if (hideList) {
    hideProjectsList();
  }

  document.getElementById("statusText").textContent = statusMessage;
}

function newProject() {
  if (
    !confirm(
      "Start a new project? Unsaved changes will be lost."
    )
  ) {
    return;
  }

  applyNewProjectReset({ hideList: true });
}

function hideProjectsList() {
  const projectsList = document.getElementById("projectsList");
  if (!projectsList) return;
  projectsList.innerHTML = "";
  projectsList.style.display = "none";
}

function showProjectsList(contentHtml) {
  const projectsList = document.getElementById("projectsList");
  if (!projectsList) return;

  projectsList.innerHTML =
    '<div style="margin-bottom:10px;">' +
    '<button type="button" onclick="hideProjectsList()">Hide Projects</button>' +
    "</div>" +
    contentHtml;
  projectsList.style.display = "block";
}

function buildProjectCardHtml(site, index) {
  const updatedDate = site.updated_at
    ? new Date(site.updated_at).toLocaleString()
    : "Unknown";

  const createdDate = site.created_at
    ? new Date(site.created_at).toLocaleString()
    : "Unknown";

  return `
    <div class="card" style="margin-bottom:12px;">
      <h4>${SiteSchema.escapeHtml(site.title || "Untitled Website")}</h4>
      <p style="color:#cbd5e1; margin:6px 0;">
        Last saved: ${updatedDate}
      </p>
      <p style="color:#94a3b8; margin:6px 0;">
        Created: ${createdDate}
      </p>
      <button onclick="openProject(${index})">Open Project</button>
      <button onclick="deleteProject('${site.id}')" style="margin-left:8px;">Delete</button>
    </div>
  `;
}

function renderLoadedProjectsList() {
  if (!window.loadedProjects || window.loadedProjects.length === 0) {
    showProjectsList("<p>No saved projects yet.</p>");
    return;
  }

  showProjectsList(
    window.loadedProjects
      .map((site, index) => buildProjectCardHtml(site, index))
      .join("")
  );
}


    function loadSavedSite() {
      const saved = localStorage.getItem(SITE_DATA_KEY);

      if (saved) {
        const parsed = JSON.parse(saved);
        siteData = normalizeCurrentSiteData(parsed);
        renderSite(siteData);
      }
    }

   function saveVersionBeforeChange() {
  try {
    const history =
      JSON.parse(localStorage.getItem(SITE_HISTORY_KEY)) || [];

    const safeCopy = cleanSiteDataForStorage(siteData);

    if (
      safeCopy.heroImageUrl &&
      safeCopy.heroImageUrl.startsWith("data:image")
    ) {
      safeCopy.heroImageUrl = "";
    }

    if (
      safeCopy.logoUrl &&
      safeCopy.logoUrl.startsWith("data:image")
    ) {
      safeCopy.logoUrl = "";
    }

    history.unshift({
      timestamp: new Date().toISOString(),
      data: safeCopy
    });

    if (history.length > MAX_HISTORY) {
      history.length = MAX_HISTORY;
    }

    localStorage.setItem(
      SITE_HISTORY_KEY,
      JSON.stringify(history)
    );
  } catch (error) {
    console.warn(
      "Could not save version history:",
      error
    );

    localStorage.removeItem(SITE_HISTORY_KEY);
  }
}
    function getVersionHistory() {
      return JSON.parse(localStorage.getItem(SITE_HISTORY_KEY)) || [];
    }

    function clearVersionHistory() {
      localStorage.removeItem(SITE_HISTORY_KEY);
      renderHistoryList();
    }

    function renderHistoryList() {
      const historyList = document.getElementById("historyList");
      const history = getVersionHistory();

      if (!historyList) return;

      if (history.length === 0) {
        historyList.innerHTML = "<p>No saved versions yet.</p>";
        return;
      }

      historyList.innerHTML = history
        .map((version, index) => {
          const date = new Date(version.timestamp).toLocaleString();

          return `
            <div class="history-item">
              <span>${date}</span>
              <button onclick="restoreVersion(${index})">Restore</button>
            </div>
          `;
        })
        .join("");
    }

    function restoreVersion(index) {
      const history = getVersionHistory();

      if (!history[index]) return;

      saveVersionBeforeChange();

      const restored = history[index].data || {};
      siteData = normalizeCurrentSiteData(restored);

      saveCurrentSite();
      renderSite(siteData);
      renderHistoryList();
    }
function parseApiErrorResponse(rawText, fallbackMessage) {
  if (!rawText) {
    return fallbackMessage;
  }

  try {
    const parsed = JSON.parse(rawText);
    return parsed.error || fallbackMessage;
  } catch {
    if (/NOT_FOUND|The page could not be found/i.test(rawText)) {
      return "API route not found. Run the app with Vercel or vercel dev so /api routes are available.";
    }

    return rawText.length > 180
      ? fallbackMessage
      : rawText;
  }
}

   function addPage() {
  const statusText = document.getElementById("statusText");

  try {
  saveVersionBeforeChange();

  if (!siteData.pages) {
    siteData.pages = [
      {
        slug: "home",
        title: "Home",
        fileName: "index.html",
        content: "Welcome to the home page."
      }
    ];
  }

  const pageTitle = prompt("What should this page be called?");

  if (!pageTitle || !pageTitle.trim()) return;

  const slug = pageTitle
    .toLowerCase()
    .trim()
    .replace(/[^a-z0-9]+/g, "-")
    .replace(/^-|-$/g, "");

  const slugValidation = SiteSchema.validatePageSlug(slug, siteData);
  if (!slugValidation.valid) {
    alert(slugValidation.reason);
    return;
  }

  const exists = siteData.pages.some(p => p.slug === slug);
  if (exists) {
    alert("Page already exists.");
    return;
  }

  siteData.pages.push({
    slug: slug,
    title: pageTitle,
    fileName: slug + ".html",
    components: []
  });

  siteData = normalizeCurrentSiteData(siteData);
  saveCurrentSite();
  renderSite(siteData);
  renderHistoryList();

  statusText.textContent = pageTitle + " page added.";
  } catch (error) {
    console.error("Add page failed:", error);
    statusText.textContent = "Add page failed: " + error.message;
  }
}
function renderPreviewNavbar(data) {
  const navLinks = document.getElementById("previewNavLinks");

  if (!navLinks) return;

  const pages = data.pages || [
    {
      slug: "home",
      title: "Home",
      fileName: "index.html"
    }
  ];

  navLinks.innerHTML = pages
    .map(page => {
      // page.slug is validated alphanumeric+hyphens by normalizePages — safe in onclick
      return `<a href="#" onclick="switchPage('${page.slug}'); return false;">${SiteSchema.escapeHtml(page.title)}</a>`;
    })
    .join("");

  SiteSchema.getHomeSectionNavLinks(data).forEach((section) => {
    if (!pages.some((page) => page.slug === section.id)) {
      const label = section.title || section.id;
      // Strip to alphanumeric+hyphens for the onclick — valid section IDs never contain other chars
      const safeId = String(section.id || "").replace(/[^a-z0-9-]/gi, "");
      if (!safeId) return;
      navLinks.innerHTML += `<a href="#" onclick="goToHomeSection('${safeId}'); return false;">${SiteSchema.escapeHtml(label)}</a>`;
    }
  });
}
function scrollToHomeSection(sectionId) {
  const homeRoot = document.getElementById("homeSectionsRoot");
  if (!homeRoot) return;

  const sectionEl = homeRoot.querySelector(
    `[data-section-id="${sectionId}"]`
  );

  if (sectionEl) {
    sectionEl.scrollIntoView({ behavior: "smooth", block: "start" });
  }
}

function goToHomeSection(sectionId) {
  if (currentPage !== "home") {
    switchPage("home");
  }

  scrollToHomeSection(sectionId);
}
function renderPagesContent(data) {
  const pagesContent = document.getElementById("pagesContent");

  if (!pagesContent) return;

  const pages = data.pages || [];
  const current = pages.find(p => p.slug === currentPage);

  if (!current || currentPage === "home") {
    pagesContent.innerHTML = "";
    return;
  }

  const esc = SiteSchema.escapeHtml;

  const componentsHtml = (current.components || []).map(c => {
    if (c.type === "text") {
      return `<p>${esc(c.value)}</p>`;
    }

    if (c.type === "pricing") {
      return `
        <div class="cards">
          ${(c.tiers || []).map(t => `
            <div class="card">
              <h4>${esc(t.name)}</h4>
              <p style="font-size:28px;font-weight:bold;">$${esc(t.price ?? "")}</p>
              <p>${esc(t.description || "")}</p>
            </div>
          `).join("")}
        </div>
      `;
    }

    if (c.type === "button") {
      // Reject javascript: URLs — allow only http/https/relative hrefs
      const rawLink = c.link || "#";
      const safeLink = /^javascript:/i.test(rawLink.trim()) ? "#" : rawLink;
      return `
        <a href="${esc(safeLink)}" class="theme-cta">
          ${esc(c.text || "Click Here")}
        </a>
      `;
    }

    if (c.type === "testimonial") {
      return `
        <div class="cards">
          ${(c.reviews || []).map(r => `
            <div class="card">
              <p class="theme-accent" style="font-size:20px;margin-bottom:10px;">
                ${"★".repeat(Math.min(Math.max(Number(r.rating) || 5, 1), 5))}
              </p>
              <p>"${esc(r.quote || "")}"</p>
              <h4 style="margin-top:14px;">
                ${esc(r.name || "Customer")}
              </h4>
            </div>
          `).join("")}
        </div>
      `;
    }

    if (c.type === "faq") {
      return `
        <div>
          ${(c.items || []).map(item => `
            <div class="card" style="margin-bottom:14px;">
              <h4>${esc(item.question || "")}</h4>
              <p>${esc(item.answer || "")}</p>
            </div>
          `).join("")}
        </div>
      `;
    }

    return "";
  }).join("");

  pagesContent.innerHTML = `
    <div class="card">
      <h4 class="section-heading">${esc(current.title)}</h4>
      ${componentsHtml || "<p>Add content for this page.</p>"}
    </div>
  `;
}

function switchPage(slug) {
  const page = SiteSchema.findPageBySlug(siteData, slug);

  if (!page) {
    document.getElementById("statusText").textContent =
      "That page could not be found.";
    return;
  }

  currentPage = slug;
  renderSite(siteData);

  const label = document.getElementById("editingLabel");

  if (label) {
    label.textContent = "Editing: " + page.title;
  }
}
function renderSite(data) {
  data = normalizeCurrentSiteData(data);
  siteData = data;

  renderPreviewNavbar(data);
  renderPagesContent(data);

  const isHome = currentPage === "home";
  const homeRoot = document.getElementById("homeSectionsRoot");
  const pagesSection = document.getElementById("pagesSection");

  if (homeRoot) {
    SiteSchema.renderHomeSections(homeRoot, data, { mode: "preview" });

const safeSiteData = JSON.parse(JSON.stringify(siteData));

if (

        });

        const rawText = await response.text();
        let data = {};

        } catch {
          throw new Error(parseApiErrorResponse(rawText, "Update failed."));
        }

        if (!response.ok) {
          throw new Error(parseApiErrorResponse(rawText, data.error || "Update failed."));
        }

        if (data.responseFormat === "actions" && Array.isArray(data.actions)) {
          // ── EditorActions path ──────────────────────────────────────────────
          const result = EditorActions.applyActions(siteData, data.actions);
          siteData = result.siteData;

          // If the active custom page was deleted (deletePage or deleteContent
          // that actually removed something), switch back to home.
          const deletedCurrentPage = result.applied.find(
            (a) =>
              (a.type === "deletePage" || (a.type === "deleteContent" && !a._nothingFound)) &&
              a.slug === currentPage
          );
          if (deletedCurrentPage) {

            }

          // deleteContent sets _nothingFound when neither the page nor the
          // section existed — surface a friendly message instead of "Website
          // updated." or a scary "(N changes could not be applied)" warning.
          const nothingFound =
            result.applied.length > 0 &&
            result.applied.every((a) => a._nothingFound);

          if (result.skipped.length > 0) {
            console.warn("EditorActions skipped:", result.skipped);
          }

          const skipMsg = result.skipped.length > 0
            ? ` (${result.skipped.length} change${result.skipped.length === 1 ? "" : "s"} could not be applied)`
            : "";
          statusText.textContent = deletedCurrentPage
            ? "Page deleted."
            : nothingFound
            ? "Nothing found to delete."
            : `Website updated.${skipMsg}`;

        } else if (isHomePage) {
          // ── Patch path for home (actions fallback) ──────────────────────────
          const { responseFormat: _rf, ...patch } = data;
          siteData = normalizeCurrentSiteData({ ...siteData, ...patch });
          statusText.textContent = "Website updated.";

        } else {
          // ── Patch path for custom pages (unchanged) ─────────────────────────
          const pageIndex = siteData.pages.findIndex((p) => p.slug === currentPage);
          if (pageIndex !== -1 && Array.isArray(data.content)) {
            siteData.pages[pageIndex].components = [
              ...(siteData.pages[pageIndex].components || []),
              ...data.content,
            ];
          }
          siteData = normalizeCurrentSiteData(siteData);
          statusText.textContent = "Website updated.";
        }

        renderSite(siteData);
        saveCurrentSite();
        renderHistoryList();

        document.getElementById("exportBtn").style.display = "inline-block";
        document.getElementById("editPrompt").value = "";
      } catch (error) {

        statusText.textContent = "Update failed: " + error.message;
      }

function downloadFile(filename, content, type = "text/plain") {
  const blob = new Blob([content], { type });
  const url = window.URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);

  window.URL.revokeObjectURL(url);
}


async function launchWebsite() {
  if (!siteData) {
    alert("Generate a website first.");
    return;
  }

  const statusText = document.getElementById("statusText");
  statusText.textContent = "Publishing website...";

  try {
    const safeSiteData = cleanSiteDataForStorage(
      normalizeCurrentSiteData(siteData)
    );

    const response = await fetch("/api/publish-site", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        title: safeSiteData.heroTitle || "Untitled Website",
        siteData: safeSiteData
      })
    });

    const rawText = await response.text();
    let data = {};

    try {
      data = rawText ? JSON.parse(rawText) : {};
    } catch {
      throw new Error(
        parseApiErrorResponse(rawText, "Publish failed.")
      );
    }

    if (!response.ok) {
      throw new Error(
        parseApiErrorResponse(rawText, data.error || "Publish failed.")
      );
    }

    if (!data.id) {
      throw new Error("Publish succeeded but no site id was returned.");
    }

    const shareUrl =
      window.location.origin + "/site.html?id=" + data.id;

    window.open(shareUrl, "_blank");

    statusText.innerHTML =
      'Website published. Share this link: <a href="' +
      shareUrl +
      '" target="_blank" rel="noopener">' +
      shareUrl +
      "</a>";
  } catch (error) {
    console.error("Launch failed:", error);
    statusText.textContent = "Launch failed: " + error.message;
  }
}

    // ── Clerk Authentication ──────────────────────────────────────────────────

    let clerkInstance = null;

    async function getSessionToken() {
      if (!clerkInstance || !clerkInstance.session) return null;
      return clerkInstance.session.getToken();
    }

    function authHeaders(extraHeaders = {}) {
      // Returns a promise that resolves to the headers object.
      // Use with: const headers = await authHeaders({ "Content-Type": "application/json" });
      return getSessionToken().then(token => ({
        ...extraHeaders,
        ...(token ? { Authorization: `Bearer ${token}` } : {})
      }));
    }

    function updateAuthBar() {
      const signInBtn = document.getElementById("authSignInBtn");
      const signOutBtn = document.getElementById("authSignOutBtn");
      const userEmail = document.getElementById("authUserEmail");

      if (!clerkInstance) return;

      const user = clerkInstance.user;

      if (user) {
        const email = user.primaryEmailAddress?.emailAddress || "";
        userEmail.textContent = email;
        userEmail.style.display = email ? "inline" : "none";
        signInBtn.style.display = "none";
        signOutBtn.style.display = "inline-block";
      } else {
        userEmail.style.display = "none";
        signInBtn.style.display = "inline-block";
        signOutBtn.style.display = "none";
      }
    }

    function clerkSignIn() {
      if (clerkInstance) clerkInstance.openSignIn({});
    }

    function clerkSignOut() {
      if (clerkInstance) clerkInstance.signOut().then(updateAuthBar);
    }

    async function initClerk() {
      try {
        const configRes = await fetch("/api/app-config");
        const config = await configRes.json();

        if (!config.clerkPublishableKey) {
          // Clerk not configured — auth bar stays hidden, all features still work.
          console.warn("Clerk publishable key not set. Authentication disabled.");
          return;
        }

        // Inject the Clerk CDN script with the key set as a data attribute so
        // Clerk v5 auto-initializes correctly (window.Clerk is a singleton that
        // requires the key at load time, not via new Clerk() or .load()).
        await new Promise((resolve, reject) => {
          const script = document.createElement("script");
          script.src = "https://cdn.jsdelivr.net/npm/@clerk/clerk-js@5/dist/clerk.browser.js";
          script.dataset.clerkPublishableKey = config.clerkPublishableKey;
          script.onload = resolve;
          script.onerror = () => reject(new Error("Failed to load Clerk SDK"));
          document.head.appendChild(script);
        });

        clerkInstance = window.Clerk;
        if (!clerkInstance) throw new Error("Clerk SDK did not initialize");

        // Auto-init via data attribute starts load() asynchronously. Await it
        // explicitly so openSignIn() can mount the modal — calling it before
        // load() resolves silently does nothing.
        await clerkInstance.load();

        clerkInstance.addListener(updateAuthBar);
        updateAuthBar();
      } catch (err) {
        console.warn("Clerk initialization failed:", err.message);
      }
    }

        const bodyData = {

          siteData: cleanedData
        };
        if (currentProjectId) bodyData.id = currentProjectId;

        const headers = await authHeaders({ "Content-Type": "application/json" });
        const response = await fetch(endpoint, {
          method: "POST",
          headers,
          body: JSON.stringify(bodyData)
        });

        const data = await response.json();
        if (!response.ok) throw new Error(data.error || "Save failed");

        if (data.website && data.website.id) currentProjectId = data.website.id;

        document.getElementById("statusText").textContent =
          currentProjectId ? "Project saved!" : "Project updated!";

        console.error("Save project error:", error);

    async function deleteProject(projectId) {
      if (!confirm("Delete this project? This cannot be undone.")) return;

      const token = await getSessionToken();
      if (!token) {
        document.getElementById("statusText").textContent =
          "Sign in to delete projects.";
        return;
      }

      const statusText = document.getElementById("statusText");
      statusText.textContent = "Deleting project...";

      try {
        const headers = await authHeaders({ "Content-Type": "application/json" });
        const response = await fetch("/api/delete-site", {
          method: "POST",
          headers,
          body: JSON.stringify({ id: projectId })
        });

        const data = await response.json();
        if (!response.ok) throw new Error(data.error || "Delete failed");

        const wasOpen = currentProjectId === projectId;
        window.loadedProjects = (window.loadedProjects || []).filter(
          p => p.id !== projectId
        );
        renderLoadedProjectsList();

        if (wasOpen) {
          applyNewProjectReset({ hideList: false, statusMessage: "Deleted project was open. Started a new project." });
        } else {
          statusText.textContent = "Project deleted.";
        }
      } catch (error) {
        console.error("Delete project error:", error);
        document.getElementById("statusText").textContent =
          "Delete failed: " + error.message;
      }
